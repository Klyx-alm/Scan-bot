<!DOCTYPE html>
<html>
<head>
    <title>HackerBot Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:monospace;background:#0a0a0a;color:#00ff00}
        body{padding:20px;max-width:1200px;margin:auto}
        #chatbox{height:400px;overflow-y:auto;border:1px solid #333;padding:20px;margin:20px 0;background:#111}
        #input{width:80%;padding:15px;font-size:16px;border:1px solid #00ff00;background:#000}
        #send{padding:15px;background:#00ff00;color:#000;font-weight:bold;cursor:pointer}
        .msg{padding:10px;margin:5px 0;border-left:3px solid #00ff00}
        .user{background:#003300}
        .bot{background:#220022}
    </style>
</head>
<body>
    <h1>🤖 HACKERBOT v2.0</h1>
    <div id="chatbox"></div>
    <input id="input" placeholder="Tape 'scan 10.0.0.1' ou 'android rat'...">
    <button id="send">SEND 🔥</button>

    <script>
        const chatbox = document.getElementById('chatbox');
        const input = document.getElementById('input');
        const send = document.getElementById('send');
        
        function addMessage(msg, cls='bot') {
            const div = document.createElement('div');
            div.className = `msg ${cls}`;
            div.textContent = msg;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }
        
        send.onclick = async () => {
            const msg = input.value.trim();
            if(!msg) return;
            
            addMessage(msg, 'user');
            input.value = '';
            
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                addMessage(data.response);
            } catch(e) {
                addMessage('❌ Error: ' + e.message);
            }
        };
        
        input.onkeypress = (e) => e.key === 'Enter' && send.click();
        
        addMessage("🤖 HACKERBOT READY | Commands: scan nmap exploit shell android help");
    </script>
</body>
</html>
